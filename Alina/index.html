<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>L School</title>
</head>
<body>

<main>
    <section class="main">
        <div class="main__container">
            <div class="main__container__block">
                <div class="main__container__block__header__text">
                    КУРСЫ<br>
                    ИНОСТРАННЫХ<br>
                    ЯЗЫКОВ<br>
                </div>
                <div class="main__container__block__text">группы до 4 человек</div>
            </div>
            <div class="main__container__block"></div>
            <div class="main__container__block"></div>
            <div class="main__container__block">
                <div class="main__container__block__header__text">ПОЧЕМУ ИМЕННО МЫ?</div>
                <div class="main__container__block__text">
                    · 6 языков на выбор<br>
                    · 10 лет опыта<br>
                    · 2371 выпускник
                </div>
            </div>
        </div>
        <div class="main__information">
            <div class="main__information__header__text">Языки на выбор:</div>
            <div class="main__information__container">
                <div class="main__information__container__block">
                    <div class="main__information__container__block__text">· Английский</div>
                    <div class="main__information__container__block__text">· Китайский</div>
                    <div class="main__information__container__block__text">· Корейский</div>
                </div>
                <div class="main__information__container__block">
                    <div class="main__information__container__block__text">· Немецкий</div>
                    <div class="main__information__container__block__text">· Испанский</div>
                    <div class="main__information__container__block__text">· Французский</div>
                </div>
            </div>
        </div>
    </section>

    <aside class="sidebar">
        <div class="sidebar__header">Подать заявку быстро!</div>
        <form class="sidebar__form">
            <div class="sidebar__form__block">
                <label class="sidebar__form__block__label" for="name">Имя</label>
                <input class="sidebar__form__block__input" id="name" type="text" name="name">
            </div>
            <div class="sidebar__form__block">
                <label class="sidebar__form__block__label" for="surname">Фамилия</label>
                <input class="sidebar__form__block__input" id="surname" type="text" name="surname">
            </div>
            <div class="sidebar__form__block">
                <label class="sidebar__form__block__label" for="number">Телефон</label>
                <input class="sidebar__form__block__input" id="number" type="tel" name="number">
            </div>
            <div class="sidebar__form__block">
                <label class="sidebar__form__block__label" for="language">Язык</label>
                <input class="sidebar__form__block__input" id="language" type="text" name="language">
            </div>
        </form>
        <button class="sidebar__button" onclick="location.reload()">отправить</button>
    </aside>

</main>

<footer class="footer">
    <div class="footer__contacts">
        <div class="footer__contacts__text">Связь: </div>
        <div class="footer__contacts__text">+7 900 000 0000 ; </div>
        <div class="footer__contacts__text">+7 911 111 1111 .</div>
    </div>
    <div class="footer__links">
        <div class="footer__links__text">Телеграмм: </div>
        <div class="footer__links__text">@lschool_25</div>
    </div>
</footer>

</body>
</html>
